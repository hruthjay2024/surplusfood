<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Donations</title>

<style>
        .site-header {
            background: #2e7d32;
            padding: 15px 0;
            color: white;
        }

        .header-inner {
            width: 90%;
            max-width: 1100px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: bold;
        }

        .logo-img {
            width: 45px;
        }

        .nav a {
            margin: 0 12px;
            color: white;
            font-weight: 600;
            text-decoration: none;
        }

        .nav a:hover {
            text-decoration: underline;
        }

        .btn-cta {
            background: white;
            color: #2e7d32 !important;
            padding: 8px 15px;
            border-radius: 6px;
        }
  
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
}

.header {
  background: #2e7d32;
  color: white;
  padding: 15px 40px;
  font-size: 20px;
  font-weight: bold;
}

.container {
  width: 80%;
  margin: 40px auto;
}

h1 {
  color: #2e7d32;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  margin-top: 20px;
}

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.badge {
  background: #ffe0b2;
  color: #ef6c00;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 14px;
}

.location {
  margin: 5px 0;
  color: #555;
}

.date {
  font-size: 14px;
  color: gray;
}

.progress {
  display: flex;
  justify-content: space-between;
  margin-top: 25px;
  text-align: center;
}

.step {
  flex: 1;
}

.circle {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid #ccc;
  margin: 0 auto 8px;
}

.active {
  background: #2e7d32;
  border-color: #2e7d32;
}

.completed {
  background: #2e7d32;
  border-color: #2e7d32;
}

.label {
  font-size: 13px;
  color: #444;
}
/* ===== NAVBAR ===== */

.navbar {
  background: #2e7d32;
  padding: 12px 40px;
}

.nav-container {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  color: white;
  font-size: 20px;
  font-weight: bold;
}

.logo-img {
  height: 35px;
  margin-right: 10px;
}

.nav-links {
  display: flex;
  gap: 18px;
}

.nav-links a {
  text-decoration: none;
  color: white;
  padding: 8px 14px;
  border-radius: 6px;
  transition: 0.3s;
}

.nav-links a:hover {
  background: rgba(255,255,255,0.2);
}

.logout-btn {
  background: #e53935;
  color: white;
  border: none;
  padding: 8px 18px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.logout-btn:hover {
  background: #c62828;
}
</style>
</head>

<body>

<header class="navbar">
  <div class="nav-container">

    <div class="logo">
      <img src="images/logo.png" class="logo-img">
      <span>Food Surplus</span>
    </div>

    <nav class="nav-links">
      <a href="home.html">Home</a>
      <a href="about.html">About</a>
      <a href="hiw.html">How It Works</a>
      <a href="get.html">Get Involved</a>
      <a href="contact.html">Contact</a>
      <a href="donation.html">Donate Food</a>
      <a href="my-donation.html">Tracking</a>
    </nav>

    <button id="logoutBtn" class="logout-btn">Logout</button>

  </div>
</header>

<div class="container">
  <h1>My Donations</h1>
  <div id="donationsContainer"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  // 🔐 AUTH CHECK
  if (!localStorage.getItem("role")) {
    window.location.href = "login.html";
  }

  // 🚪 LOGOUT
  document.getElementById("logoutBtn").addEventListener("click", () => {
    localStorage.clear();
    window.location.href = "index.html";
  });

  // 📦 FETCH DONATIONS
  try {
    const res = await fetch("http://localhost:5000/api/food/all");
    const donations = await res.json();

    const container = document.getElementById("donationsContainer");

    donations.forEach(d => {

      const statusMap = {
        "Pending": 1,
        "Pickup Scheduled": 2,
        "Food Collected": 3,
        "Delivered": 4
      };

      const currentStep = statusMap[d.status] || 1;

      container.innerHTML += `
        <div class="card">
          <div class="card-top">
            <div>
              <h3>${d.donorName}</h3>
              <p>${d.foodType} — ${d.quantity}</p>
              <div class="location">📍 ${d.pickupLocation}</div>
              <div class="date">${new Date(d.createdAt).toLocaleDateString()}</div>
            </div>
            <div class="badge">${d.status || "Pending"}</div>
          </div>

          <div class="progress">
            <div class="step">
              <div class="circle ${currentStep >= 1 ? 'completed' : ''}"></div>
              <div class="label">Donation Submitted</div>
            </div>

            <div class="step">
              <div class="circle ${currentStep >= 2 ? 'completed' : ''}"></div>
              <div class="label">Pickup Scheduled</div>
            </div>

            <div class="step">
              <div class="circle ${currentStep >= 3 ? 'completed' : ''}"></div>
              <div class="label">Food Collected</div>
            </div>

            <div class="step">
              <div class="circle ${currentStep >= 4 ? 'completed' : ''}"></div>
              <div class="label">Delivered to NGO</div>
            </div>
          </div>
        </div>
      `;
    });

  } catch (err) {
    alert("Error loading donations");
  }

});
</script>

</body>
</html>
