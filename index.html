<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Food Surplus</title>
  <style>
    body {
      background: linear-gradient(135deg, #2e7d32, #1b5e20);
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
    }

    .box {
      background: white;
      padding: 30px;
      width: 320px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      color: #2e7d32;
      margin-bottom: 15px;
    }

    input {
      width: 80%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 80%;
      padding: 10px;
      background: #2e7d32;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #1b5e20;
    }
  </style>
</head>

<body>

  <!-- USER LOGIN -->
  <div class="box">
    <h2>User Login</h2>
    <form id="userLoginForm">
      <input type="email" id="userEmail" placeholder="Email" required>
      <input type="password" id="userPassword" placeholder="Password" required>
      <button type="submit">Login</button>
      <p>donot have an account?<a href="register.html">register</a></p>
    </form>
  </div>

  <!-- ADMIN LOGIN -->
  <div class="box">
    <h2>Admin Login</h2>
    <form id="adminLoginForm">
      <input type="email" id="adminEmail" placeholder="Admin Email" required>
      <input type="password" id="adminPassword" placeholder="Admin Password" required>
      <button type="submit">Login</button>
      
    </form>
  </div>

  <script src="login.js"></script>
</body>
</html>
